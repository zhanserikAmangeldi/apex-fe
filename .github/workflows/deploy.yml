name: Build & Deploy Frontend

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg VITE_API_BASE=https://zham.space/api/ \
            --build-arg VITE_WS_URL=wss://zham.space/ws \
            -t $DOCKER_USERNAME/apex-frontend:${{ steps.tag.outputs.tag }} \
            -t $DOCKER_USERNAME/apex-frontend:latest \
            --push .

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: zhanserikAmangeldi/apex-be
          ref: main
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Update frontend image tag
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          sed -i "s|newTag: .* # apex-frontend|newTag: \"${IMAGE_TAG}\" # apex-frontend|" \
            k8s/overlays/k3s-prod/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/k3s-prod/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update frontend image tag [skip ci]"
          git push
